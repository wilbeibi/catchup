document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

important; }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after { animation: none !important; scroll-behavior: auto !important; }\n  }\n<\u002Fstyle>\n<noscript>\n  <div style=\"font-family: Georgia, serif; max-width: 680px; margin: 0 auto; padding: 48px 24px; color: #232019;\">\n    <h1>catchup<\u002Fh1>\n    <p>An open-source CLI that turns Claude Code, Codex, OpenCode &amp; Pi Agent session history into clean, handoff-ready Markdown. Switch between coding agents without re-explaining everything.<\u002Fp>\n    <p>Install: <code>go install github.com/wilbeibi/catchup@latest<\u002Fcode><\u002Fp>\n    <p><a href=\"https://github.com/wilbeibi/catchup\">View on GitHub<\u002Fa> · <a href=\"https://pkg.go.dev/github.com/wilbeibi/catchup\">Reference on pkg.go.dev<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n<\u002Fnoscript>\n<\u002Fhelmet>\n\n<main ref=\"{{ rootRef }}\" style=\"--accent: #c2792e; --green: #5f7d3b; background: #f7f4ec; color: #232019; font-family: 'Newsreader', Georgia, serif; min-height: 100vh; background-image: radial-gradient(#e6dfcd 1px, transparent 1px); background-size: 26px 26px;\">\n\n  <!-- NAV -->\n  <nav style=\"max-width: 1080px; margin: 0 auto; padding: 26px 32px; display: flex; align-items: center; justify-content: space-between;\">\n    <a href=\"https://catchup.pages.dev/\" style=\"display: flex; align-items: baseline; gap: 2px; text-decoration: none; color: #232019;\">\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 19px; letter-spacing: -0.02em;\">catchup<\u002Fspan>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 19px; font-weight: 600;\">_<\u002Fspan>\n    <\u002Fa>\n    <div style=\"display: flex; align-items: center; gap: 28px; font-family: 'IBM Plex Mono', monospace; font-size: 13px;\">\n      <a href=\"https://pkg.go.dev/github.com/wilbeibi/catchup\" style=\"color: #6b6354; text-decoration: none;\" style-hover=\"{{ navHover }}\">docs<\u002Fa>\n      <a href=\"https://github.com/wilbeibi/catchup\" style=\"color: #232019; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; border: 1px solid #d9d1bd; padding: 7px 13px; border-radius: 6px;\" style-hover=\"{{ ghHover }}\">\n        <span style=\"color: var(--accent);\">★<\u002Fspan> GitHub\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header style=\"max-width: 1080px; margin: 0 auto; padding: 64px 32px 40px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 26px;\">Open-source CLI · Go · MIT<\u002Fdiv>\n    <h1 style=\"font-size: clamp(40px, 6.4vw, 76px); line-height: 1.02; font-weight: 500; letter-spacing: -0.025em; margin: 0; max-width: 16ch; text-wrap: balance;\">Switch coding agents without <em style=\"font-style: italic; color: var(--accent);\">re-explaining.<\u002Fem><\u002Fh1>\n    <p style=\"font-size: clamp(18px, 2.1vw, 22px); line-height: 1.5; color: #514a3d; max-width: 56ch; margin: 28px 0 0; text-wrap: pretty;\">catchup reads your Claude Code, Codex, OpenCode, and Pi Agent session history and prints clean, handoff-ready Markdown — just the conversation, none of the tool-call noise. The next agent picks up instantly.<\u002Fp>\n\n    <div style=\"display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-top: 38px;\">\n      <button onclick=\"{{ copyInstall }}\" aria-label=\"Copy install command\" style=\"display: inline-flex; align-items: center; gap: 12px; max-width: 100%; background: #232019; color: #f7f4ec; border: none; border-radius: 8px; padding: 13px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 14px; cursor: pointer; box-shadow: 0 1px 0 #00000018;\" style-hover=\"{{ installHover }}\">\n        <span style=\"color: var(--green); flex-shrink: 0;\">$<\u002Fspan>\n        <span style=\"overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none;\">go install github.com/wilbeibi/catchup@latest<\u002Fspan>\n        <span style=\"color: #9b9482; font-size: 11px; white-space: nowrap; flex-shrink: 0; border-left: 1px solid #4a4639; padding-left: 12px;\">{{ copyLabel }}<\u002Fspan>\n      <\u002Fbutton>\n      <a href=\"https://github.com/wilbeibi/catchup\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: #232019; text-decoration: none; border-bottom: 1.5px solid var(--accent); padding-bottom: 2px;\">View on GitHub →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- FIG 1: BEFORE / AFTER TERMINAL -->\n  <section data-reveal=\"\" style=\"max-width: 1080px; margin: 0 auto; padding: 28px 32px 24px;\">\n    <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #8d8675;\">\n      <span style=\"text-wrap: balance;\">Fig. 1 — Claude Code hits its limit; the next agent runs catchup and keeps going<\u002Fspan>\n      <span style=\"color: #b8af9a; flex-shrink: 0;\">no re-briefing<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cu-bashgrid\" style=\"display: grid; grid-template-columns: 1fr auto 1fr; align-items: stretch; gap: 0; border: 1px solid #d9d1bd; border-radius: 12px; overflow: hidden; background: #14130f; box-shadow: 0 24px 60px -28px #00000055;\">\n\n      <!-- BEFORE -->\n      <div style=\"padding: 0; display: flex; flex-direction: column; min-width: 0;\">\n        <div style=\"display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #2a2820;\">\n          <span style=\"width: 11px; height: 11px; border-radius: 50%; background: #5a5648;\"><\u002Fspan>\n          <span style=\"width: 11px; height: 11px; border-radius: 50%; background: #45423a;\"><\u002Fspan>\n          <span style=\"width: 11px; height: 11px; border-radius: 50%; background: #45423a;\"><\u002Fspan>\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6f6a5a; margin-left: 8px;\">~/.claude/projects/app/a1b2.jsonl<\u002Fspan>\n        <\u002Fdiv>\n        <pre style=\"margin: 0; padding: 18px 18px 22px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.85; color: #57534a; overflow-x: auto; white-space: pre; flex: 1;\">{\"type\":\"tool_use\",\"name\":\n  \"Read\",\"input\":{\"file\":\"…\"}}\n{\"type\":\"tool_result\",\"content\":\n  \"1.2kb returned, truncated…\"}\n{\"type\":\"reasoning\",\"tokens\":418,\n  \"text\":\"Let me check the …\"}\n{\"type\":\"tool_use\",\"name\":\"Bash\",\n  \"input\":{\"cmd\":\"go test ./…\"}}\n{\"type\":\"tool_result\",\"exit\":0}\n{\"role\":\"assistant\",\"content\":[…]}\n<span style=\"color: #3f3c34;\"># 1,847 lines of noise<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- ARROW -->\n      <div class=\"cu-arrow\" style=\"display: flex; align-items: center; justify-content: center; padding: 0 14px; background: #1b1a14; border-left: 1px solid #2a2820; border-right: 1px solid #2a2820;\">\n        <span style=\"font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 20px;\">→<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- AFTER -->\n      <div style=\"padding: 0; display: flex; flex-direction: column; min-width: 0;\">\n        <div style=\"display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #2a2820;\">\n          <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--green);\">$ catchup claude<\u002Fspan>\n        <\u002Fdiv>\n        <pre style=\"margin: 0; padding: 18px 18px 22px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.85; color: #d6d0c0; overflow-x: auto; white-space: pre; flex: 1;\"><span style=\"color: var(--accent);\">## Session<\u002Fspan> · fix flaky auth test\n<span style=\"color: #6f6a5a;\">claude · 2h ago · 8 turns<\u002Fspan>\n\n<span style=\"color: var(--green);\">**You:**<\u002Fspan> The auth test fails 1 in\n5 runs in CI. Find the flake?\n\n<span style=\"color: var(--green);\">**Assistant:**<\u002Fspan> Token-refresh race\nin refreshToken() — guarding it\nwith a sync.Mutex.<span style=\"color: var(--accent); animation: cu-blink 1.1s step-end infinite;\">▋<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section style=\"max-width: 1080px; margin: 0 auto; padding: 72px 32px 24px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #8d8675; margin-bottom: 32px; border-top: 1px solid #ddd5c2; padding-top: 22px;\">What it does<\u002Fdiv>\n    <div class=\"cu-how\" data-reveal=\"\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;\">\n      <div style=\"padding: 4px 36px 4px 0; border-right: 1px solid #ddd5c2;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 14px; margin-bottom: 16px;\">I<\u002Fdiv>\n        <h3 style=\"font-size: 24px; font-weight: 500; margin: 0 0 12px; letter-spacing: -0.01em;\">One command, any agent<\u002Fh3>\n        <p style=\"color: #514a3d; font-size: 16.5px; line-height: 1.55; margin: 0;\"><code style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; background: #ece5d4; padding: 1px 5px; border-radius: 4px;\">catchup claude<\u002Fcode>, <code style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; background: #ece5d4; padding: 1px 5px; border-radius: 4px;\">catchup codex<\u002Fcode>, <code style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; background: #ece5d4; padding: 1px 5px; border-radius: 4px;\">catchup opencode<\u002Fcode>, <code style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; background: #ece5d4; padding: 1px 5px; border-radius: 4px;\">catchup pi-agent<\u002Fcode> — the same clean output, whichever tool wrote the history.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding: 4px 36px; border-right: 1px solid #ddd5c2;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 14px; margin-bottom: 16px;\">II<\u002Fdiv>\n        <h3 style=\"font-size: 24px; font-weight: 500; margin: 0 0 12px; letter-spacing: -0.01em;\">Just the conversation<\u002Fh3>\n        <p style=\"color: #514a3d; font-size: 16.5px; line-height: 1.55; margin: 0;\">User and assistant messages only. Tool calls, reasoning traces, and token noise are stripped — what's left is the thread you actually need.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding: 4px 0 4px 36px;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 14px; margin-bottom: 16px;\">III<\u002Fdiv>\n        <h3 style=\"font-size: 24px; font-weight: 500; margin: 0 0 12px; letter-spacing: -0.01em;\">Built for handoff<\u002Fh3>\n        <p style=\"color: #514a3d; font-size: 16.5px; line-height: 1.55; margin: 0;\">Pipe it straight to the next agent, or read it yourself days later. No re-briefing, no copy-pasting context between windows.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SUPPORTED AGENTS -->\n  <section style=\"max-width: 1080px; margin: 0 auto; padding: 72px 32px 24px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: #8d8675; margin-bottom: 28px; border-top: 1px solid #ddd5c2; padding-top: 22px;\">Supported agents<\u002Fdiv>\n    <div data-reveal=\"\" style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px;\">\n      <sc-for list=\"{{ agents }}\" as=\"agent\" hint-placeholder-count=\"4\">\n        <div style=\"border: 1px solid #ddd5c2; border-radius: 10px; padding: 22px 20px; background: #fffdf8;\" style-hover=\"{{ cardHover }}\">\n          <div style=\"font-size: 21px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 10px;\">{{ agent.name }}<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #8d8675;\"><span style=\"color: var(--green);\">$<\u002Fspan> {{ agent.cmd }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #8d8675; margin: 22px 0 0;\">Read-only. No cross-agent mixing, no raw replay, no writing — catchup never touches your sessions.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- CLOSING CTA -->\n  <section data-reveal=\"\" style=\"max-width: 1080px; margin: 0 auto; padding: 80px 32px 64px;\">\n    <div style=\"border: 1px solid #d9d1bd; border-radius: 16px; background: #fffdf8; padding: clamp(36px, 5vw, 60px); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 28px;\">\n      <div>\n        <h2 style=\"font-size: clamp(28px, 3.6vw, 40px); font-weight: 500; letter-spacing: -0.02em; margin: 0; max-width: 18ch; text-wrap: balance;\">Hand the next agent a clean slate.<\u002Fh2>\n        <p style=\"color: #514a3d; font-size: 17px; margin: 14px 0 0; max-width: 44ch;\">One <code style=\"font-family: 'IBM Plex Mono', monospace; font-size: 14px;\">go install<\u002Fcode> and you're set. MIT-licensed, no config.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 12px; align-items: stretch;\">\n        <a href=\"https://github.com/wilbeibi/catchup\" style=\"text-align: center; background: #232019; color: #f7f4ec; text-decoration: none; border-radius: 8px; padding: 14px 26px; font-family: 'IBM Plex Mono', monospace; font-size: 14px;\" style-hover=\"{{ installHover }}\"><span style=\"color: var(--green);\">★<\u002Fspan> Star on GitHub<\u002Fa>\n        <a href=\"https://pkg.go.dev/github.com/wilbeibi/catchup\" style=\"text-align: center; color: #232019; text-decoration: none; border: 1px solid #d9d1bd; border-radius: 8px; padding: 14px 26px; font-family: 'IBM Plex Mono', monospace; font-size: 14px;\" style-hover=\"{{ ghHover }}\">Read the reference →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top: 1px solid #ddd5c2;\">\n    <div style=\"max-width: 1080px; margin: 0 auto; padding: 30px 32px 48px; display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #8d8675;\">\n      <div style=\"display: flex; align-items: baseline; gap: 2px;\"><span style=\"font-weight: 600; color: #232019;\">catchup<\u002Fspan><span style=\"color: var(--accent); font-weight: 600;\">_<\u002Fspan><span style=\"margin-left: 12px;\">MIT · © 2026<\u002Fspan><\u002Fdiv>\n      <div style=\"display: flex; gap: 24px;\">\n        <a href=\"https://github.com/wilbeibi/catchup\" style=\"color: #8d8675; text-decoration: none;\" style-hover=\"{{ navHover }}\">GitHub<\u002Fa>\n        <a href=\"https://pkg.go.dev/github.com/wilbeibi/catchup\" style=\"color: #8d8675; text-decoration: none;\" style-hover=\"{{ navHover }}\">pkg.go.dev<\u002Fa>\n        <a href=\"https://github.com/wilbeibi\" style=\"color: #8d8675; text-decoration: none;\" style-hover=\"{{ navHover }}\">@wilbeibi<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  \n\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1080, &quot;height&quot;: 1400 },\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#c2792e&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#c2792e&quot;, &quot;#5f7d3b&quot;, &quot;#b1532f&quot;, &quot;#6b6354&quot;] }\n}\">\nclass Component extends DCLogic {\n  state = { copied: false };\n\n  rootRef = React.createRef();\n\n  applyAccent() {\n    const el = this.rootRef.current;\n    if (el && this.props.accentColor) el.style.setProperty('--accent', this.props.accentColor);\n  }\n  componentDidMount() { this.applyAccent(); }\n  componentDidUpdate() { this.applyAccent(); }\n\n  copyInstall = () => {\n    const cmd = 'go install github.com/wilbeibi/catchup@latest';\n    try {\n      navigator.clipboard.writeText(cmd);\n    } catch (e) {}\n    this.setState({ copied: true });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ copied: false }), 1600);\n  };\n\n  renderVals() {\n    const accent = this.props.accentColor || '#c2792e';\n    return {\n      rootRef: this.rootRef,\n      copyInstall: this.copyInstall,\n      copyLabel: this.state.copied ? 'copied ✓' : 'click to copy',\n      agents: [\n        { name: 'Claude Code', cmd: 'catchup claude' },\n        { name: 'Codex', cmd: 'catchup codex' },\n        { name: 'OpenCode', cmd: 'catchup opencode' },\n        { name: 'Pi Agent', cmd: 'catchup pi-agent' },\n      ],\n      navHover: { color: '#232019' },\n      ghHover: { borderColor: accent, background: '#fffdf8' },\n      installHover: { background: '#3a352a' },\n      cardHover: { borderColor: accent, background: '#fffefb' },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
