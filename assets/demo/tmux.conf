# tmux config for the catchup split-screen demo (loaded via -f). Minimal chrome:
# no status bar, a thin titled border over each pane so both clearly show the
# same working directory.
set -g status off
# panes run a clean bash (no user zsh/oh-my-zsh nags), with a tidy prompt + env
set -g default-command "bash --rcfile /tmp/catchup-demo/bin/panerc"
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
set -g pane-border-lines single
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#585b70"
set -g default-terminal "tmux-256color"
set -g escape-time 0
set -g base-index 0
setw -g pane-base-index 0
